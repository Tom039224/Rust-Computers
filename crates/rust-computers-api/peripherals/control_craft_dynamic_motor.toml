# Control-Craft — DynamicMotor peripheral
# (Map/List戻り値はスキップ)

[[method]]
lua = "setPID"
action = true
args = [
    { name = "p", ty = "f64" },
    { name = "i", ty = "f64" },
    { name = "d", ty = "f64" },
]

[[method]]
lua = "setTargetValue"
action = true
args = [{ name = "value", ty = "f64" }]

[[method]]
lua = "getTargetValue"
ret = "f64"

[[method]]
lua = "getAngle"
ret = "f64"

[[method]]
lua = "getAngularVelocity"
ret = "f64"

[[method]]
lua = "getCurrentValue"
ret = "f64"

[[method]]
lua = "setOutputTorque"
action = true
args = [{ name = "torque", ty = "f64" }]

[[method]]
lua = "setIsAdjustingAngle"
action = true
args = [{ name = "adjusting", ty = "bool" }]

[[method]]
lua = "lock"
action = true

[[method]]
lua = "unlock"
action = true

[[method]]
lua = "isLocked"
ret = "bool"
