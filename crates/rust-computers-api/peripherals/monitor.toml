# CC:Tweaked Monitor ペリフェラル API 定義
# Peripheral API manifest for CC:Tweaked Monitor.
#
# このファイルを編集すると build.rs が `src/monitor` モジュールを自動再生成します。
# Editing this file causes build.rs to regenerate the `monitor` module automatically.
#
# フィールド / Fields:
#   lua       = Lua 側のメソッド名 (必須) / Lua-side method name (required)
#   action    = true なら do_action (ワールド干渉系 / write/draw)
#               false (default) = request_info (情報取得系 / getters)
#   ret       = 戻り値の型 / return type: "i32" | "bool" | "str" | "(i32, i32)"
#               省略した場合は () を返す / omit for ()
#   [[method.args]]
#     name    = Rust の引数名 / argument name in generated Rust
#     ty      = 引数の型: "i32" | "str" | "bool"

#   imm       = true なら同期 _imm バリアントも生成する (@LuaFunction(immediate=true) 専用)
#               false (default) = async のみ生成

# ---- 情報取得 / Info ----

[[method]]
lua = "getType"
ret = "str"
imm = true

[[method]]
lua = "getSize"
ret = "(i32, i32)"
imm = true

[[method]]
lua = "isAdvanced"
ret = "bool"
imm = true

[[method]]
lua = "getTextScale"
ret = "i32"
imm = true

# ---- 描画 / Drawing ----

[[method]]
lua = "clear"
action = true

[[method]]
lua = "clearLine"
action = true

[[method]]
lua = "write"
action = true
args = [
    { name = "text", ty = "str" },
]

[[method]]
lua = "blit"
action = true
args = [
    { name = "text",       ty = "str" },
    { name = "text_color", ty = "str" },
    { name = "bg_color",   ty = "str" },
]

# ---- カーソル / Cursor ----

[[method]]
lua = "getCursorPos"
ret = "(i32, i32)"
imm = true

[[method]]
lua = "setCursorPos"
action = true
args = [
    { name = "x", ty = "i32" },
    { name = "y", ty = "i32" },
]

[[method]]
lua = "getCursorBlink"
ret = "bool"
imm = true

[[method]]
lua = "setCursorBlink"
action = true
args = [
    { name = "blink", ty = "bool" },
]

# ---- 色 / Colors ----

[[method]]
lua = "setTextColor"
action = true
args = [
    { name = "color", ty = "i32" },
]

[[method]]
lua = "setBackgroundColor"
action = true
args = [
    { name = "color", ty = "i32" },
]

[[method]]
lua = "getTextColor"
ret = "i32"

[[method]]
lua = "getBackgroundColor"
ret = "i32"

# ---- スクロール / Scroll ----

[[method]]
lua = "scroll"
action = true
args = [
    { name = "lines", ty = "i32" },
]

# ---- テキストスケール / Text scale ----

[[method]]
lua = "setTextScale"
action = true
args = [
    { name = "scale_x10", ty = "i32" },
]
