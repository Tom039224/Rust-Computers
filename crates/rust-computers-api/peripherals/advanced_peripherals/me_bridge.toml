# AdvancedPeripherals — MEBridge (Applied Energistics 2) peripheral
#
# getItem / exportItem / importItem などは Map 引数/List 戻り値のためスキップ。
# getTotalItemStorage など long 戻り値もスキップ。
# エネルギー系メソッド (RSBridge と共通) は f64 で実装する。

[[method]]
lua = "isConnected"
ret = "bool"

[[method]]
lua = "isOnline"
ret = "bool"

[[method]]
lua = "getStoredEnergy"
ret = "f64"

[[method]]
lua = "getEnergyCapacity"
ret = "f64"

[[method]]
lua = "getEnergyUsage"
ret = "f64"

[[method]]
lua = "getAverageEnergyInput"
ret = "f64"

[[method]]
lua = "getAverageEnergyOutput"
ret = "f64"
