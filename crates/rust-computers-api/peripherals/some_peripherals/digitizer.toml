# Some-Peripherals — Digitizer peripheral
# (checkID/getItemInSlot は Map 戻り値のためスキップ)

[[method]]
lua = "digitizeAmount"
ret = "str"
action = true
args = [{ name = "amount", ty = "i32" }]

[[method]]
lua = "rematerializeAmount"
ret = "bool"
action = true
args = [
    { name = "uuid", ty = "str" },
    { name = "amount", ty = "i32" },
]

[[method]]
lua = "mergeDigitalItems"
ret = "bool"
action = true
args = [
    { name = "into_uuid", ty = "str" },
    { name = "from_uuid", ty = "str" },
    { name = "amount", ty = "i32" },
]

[[method]]
lua = "separateDigitalItem"
ret = "str"
action = true
args = [
    { name = "from_uuid", ty = "str" },
    { name = "amount", ty = "i32" },
]

[[method]]
lua = "getItemLimitInSlot"
ret = "i32"
