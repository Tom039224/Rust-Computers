# Some-Peripherals — WorldScanner peripheral
#
# @LuaFunction メソッド一覧:
#   getBlockAt(x, y, z, inShipyard: boolean) → table (Map)
#     返値キー: block_type (str), ship_id (f64, オプション)
#
# Map を返すため ret="bytes" で生の msgpack を返す。
# in_shipyard は optional だがここでは 4 引数版のみ定義する。

[[method]]
lua  = "getBlockAt"
ret  = "bytes"
args = [
  { name = "x",           ty = "f64"  },
  { name = "y",           ty = "f64"  },
  { name = "z",           ty = "f64"  },
  { name = "in_shipyard", ty = "bool" },
]
